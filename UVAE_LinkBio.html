<title>UVAE — Wine Tasting Tales</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #7c1c41;
    min-height: 100vh;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 40px 20px;
  }
  .card {
    background: #F5EFE6;
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .logo-wrap {
    width: 90px;
    height: 90px;
    background: #7c1c41;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
  }
  .logo-wrap svg { width: 70px; height: 70px; }
  .brand {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e2725b;
    margin-bottom: 8px;
  }
  h1 {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 28px;
    color: #7c1c41;
    margin-bottom: 8px;
    font-weight: normal;
  }
  .location {
    font-size: 13px;
    color: #9c7a6a;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }
  .divider {
    width: 48px;
    height: 1px;
    background: #e2725b;
    margin: 0 auto 28px;
    opacity: 0.6;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 18px 20px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.82; }
  .btn-primary {
    background: #7c1c41;
    color: white;
  }
  .btn-secondary {
    background: white;
    color: #7c1c41;
    border: 1px solid rgba(124,28,65,0.2);
  }
  .btn-green {
    background: #25D366;
    color: white;
  }
  .btn svg {
    width: 18px;
    height: 18px;
    vertical-align: middle;
    margin-right: 8px;
    margin-top: -2px;
  }
  .pills {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    gap: 8px;
    -webkit-justify-content: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .pill {
    background: white;
    border: 1px solid rgba(124,28,65,0.15);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: #7c1c41;
  }
  .btn-row {
    display: -webkit-flex;
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .btn-row .btn {
    -webkit-flex: 1;
    flex: 1;
    margin-bottom: 0;
    padding: 16px 10px;
    font-size: 14px;
  }
  .btn-instagram {
    background: #E1306C;
    color: white;
  }
  .btn-facebook {
    background: #1877F2;
    color: white;
  }
  .footer {
    font-size: 11px;
    color: #b0907a;
    margin-top: 20px;
  }
</style>
</head>
